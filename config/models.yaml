# Provider profiles: one stack (extraction + generation + validation) per provider.
# Model IDs are set in .env; prompt paths are fixed per provider.

providers:
  gemini:
    extraction_prompt: prompts/face/extraction/visual_analysis.txt
    generation_prompt: prompts/face/generation/gemini_universal.txt

  gpt:
    extraction_prompt: prompts/face/extraction/visual_analysis.txt
    generation_prompt: prompts/face/generation/gpt_universal.txt

pipeline:
  retry_max_attempts: 3
  input_validation_prompt: prompts/face/validation/face_input_check.txt
  body_front_apose_prompt: prompts/body/front_Apose.txt
  body_side_apose_prompt: prompts/body/side_Apose.txt
